name: 测试全链路

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: DNS and network test
        run: |
          echo "=== DNS test ==="
          host rpwuykdoiippzfuhmpch.supabase.co || nslookup rpwuykdoiippzfuhmpch.supabase.co || dig rpwuykdoiippzfuhmpch.supabase.co || echo "DNS FAILED"
          echo "=== Curl test ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" https://rpwuykdoiippzfuhmpch.supabase.co/rest/v1/ || echo "Curl failed"
          echo ""
          echo "=== Ping test ==="
          ping -c 2 rpwuykdoiippzfuhmpch.supabase.co || echo "Ping failed"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run test pipeline
        run: python backend/run_once.py test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LLM_ENABLED: ${{ secrets.LLM_ENABLED }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
